<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Retro Vault Elite Admin Stats</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111b;
        --panel: rgba(15, 25, 38, 0.94);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f5f8ff;
        --muted: #aebed0;
        --gold: #ffd76b;
        --green: #62dfad;
        --danger: #ff7b95;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 215, 107, 0.18), transparent 28%),
          linear-gradient(180deg, #132033 0%, var(--bg) 100%);
      }

      main {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 72px;
      }

      .hero,
      .card {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 28px;
        box-shadow: 0 22px 80px rgba(0, 0, 0, 0.34);
      }

      .hero {
        padding: clamp(24px, 5vw, 44px);
        margin-bottom: 18px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: clamp(2.5rem, 7vw, 5rem);
        line-height: 0.94;
        letter-spacing: -0.06em;
      }

      p,
      td,
      th,
      li {
        color: var(--muted);
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-weight: 700;
      }

      input,
      button {
        min-height: 48px;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 12px 16px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        font: inherit;
      }

      button {
        cursor: pointer;
        color: #1a1004;
        background: linear-gradient(135deg, #ff9f35, var(--gold));
        font-weight: 900;
      }

      .form-row,
      .grid,
      .stat-grid {
        display: grid;
        gap: 14px;
      }

      .form-row {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 18px;
      }

      .card {
        padding: 20px;
        overflow: hidden;
      }

      .stat {
        display: block;
        color: var(--gold);
        font-size: 2.2rem;
        font-weight: 900;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--text);
      }

      .error {
        color: var(--danger);
        font-weight: 800;
      }

      .ok {
        color: var(--green);
        font-weight: 800;
      }

      .card-heading-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .card-heading-row h2 {
        margin-bottom: 0;
      }

      .small-button {
        min-height: 38px;
        padding: 8px 14px;
        font-size: 0.9rem;
      }

      @media (max-width: 820px) {
        .form-row,
        .grid,
        .stat-grid {
          grid-template-columns: 1fr;
        }

        table {
          font-size: 0.86rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Admin overview</h1>
        <p>
          Private Retro Vault Elite reporting. This shows safe account details and all-time page views tracked by the
          backend from the moment analytics is deployed.
        </p>
        <form class="form-row" id="admin-form">
          <label>
            Admin key
            <input id="admin-key" type="password" autocomplete="current-password" aria-label="Admin key" />
          </label>
          <button type="submit">Load stats</button>
        </form>
        <p id="status"></p>
      </section>
      <section id="results"></section>
    </main>
    <script>
      const API_BASE_URL = 'https://retro-vault-backend.onrender.com'
      const keyInput = document.querySelector('#admin-key')
      const form = document.querySelector('#admin-form')
      const statusEl = document.querySelector('#status')
      const resultsEl = document.querySelector('#results')
      const cachedStatsKey = 'retro-vault-admin-stats-cache'
      const cachedBarcodesKey = 'retro-vault-admin-barcodes-cache'
      const lifetimeViewsKey = 'retro-vault-lifetime-page-views'
      let latestBarcodeMappings = []

      keyInput.value = sessionStorage.getItem('retro-vault-admin-key') || ''

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
      }

      function renderCounterRows(items) {
        if (!items?.length) {
          return '<tr><td colspan="2">Nothing tracked yet.</td></tr>'
        }

        return items
          .map((item) => `<tr><td>${escapeHtml(item.name)}</td><td>${Number(item.count).toLocaleString()}</td></tr>`)
          .join('')
      }

      function renderUserRows(users) {
        if (!users?.length) {
          return '<tr><td colspan="8">No accounts yet.</td></tr>'
        }

        return users
          .map(
            (user) => `
              <tr>
                <td>${escapeHtml(user.email)}</td>
                <td>${escapeHtml(user.displayName || 'No name')}</td>
                <td>${escapeHtml(user.createdAt)}</td>
                <td>${escapeHtml(user.lastSyncedAt || 'Never')}</td>
                <td>${Number(user.ownedCount).toLocaleString()}</td>
                <td>${Number(user.wantedCount).toLocaleString()}</td>
                <td>${Number(user.favoriteCount).toLocaleString()}</td>
                <td>${escapeHtml(user.currencyCode)}</td>
              </tr>
            `,
          )
          .join('')
      }

      function renderSubscriberRows(subscribers) {
        if (!subscribers?.length) {
          return '<tr><td colspan="3">No newsletter subscribers yet.</td></tr>'
        }

        return subscribers
          .map(
            (subscriber) => `
              <tr>
                <td>${escapeHtml(subscriber.email)}</td>
                <td>${escapeHtml(subscriber.source || 'site')}</td>
                <td>${escapeHtml(subscriber.createdAt)}</td>
              </tr>
            `,
          )
          .join('')
      }

      function renderAccountEmailRows(users) {
        if (!users?.length) {
          return '<tr><td colspan="3">No account emails yet.</td></tr>'
        }

        return users
          .map(
            (user) => `
              <tr>
                <td>${escapeHtml(user.email)}</td>
                <td>${escapeHtml(user.displayName || 'No name')}</td>
                <td>${escapeHtml(user.createdAt)}</td>
              </tr>
            `,
          )
          .join('')
      }

      function renderBarcodeRows(mappings) {
        if (!mappings?.length) {
          return '<tr><td colspan="4">No shared barcode mappings yet.</td></tr>'
        }

        return mappings
          .map(
            (entry) => `
              <tr>
                <td>${escapeHtml(entry.code)}</td>
                <td>${escapeHtml(entry.gameId)}</td>
                <td>${escapeHtml(entry.source || 'admin')}</td>
                <td>${escapeHtml(entry.updatedAt || 'Unknown')}</td>
              </tr>
            `,
          )
          .join('')
      }

      function renderStats(stats) {
        const backendLifetimeViews = Number(stats.analytics.lifetimePageViews || stats.analytics.totalPageViews || 0)
        const cachedLifetimeViews = Number(localStorage.getItem(lifetimeViewsKey) || 0)
        const displayedLifetimeViews = Math.max(backendLifetimeViews, cachedLifetimeViews)
        const storage = stats.storage || {}
        const storageOk = storage.ok !== false
        const storageLabel = storage.mode === 'supabase' ? 'Supabase' : 'Local mode'

        if (displayedLifetimeViews > cachedLifetimeViews) {
          localStorage.setItem(lifetimeViewsKey, String(displayedLifetimeViews))
        }

        resultsEl.innerHTML = `
          <section class="card" style="margin-bottom: 18px; border-color: ${storageOk ? 'rgba(105, 255, 190, 0.35)' : 'rgba(255, 92, 124, 0.55)'}">
            <h2>Storage health</h2>
            <p>
              <strong>${escapeHtml(storageLabel)}</strong> -
              ${escapeHtml(storage.message || 'Storage status pending.')}
            </p>
            <p>
              Last checked: <strong>${escapeHtml(storage.checkedAt || 'Not checked yet')}</strong>
            </p>
          </section>
          <section class="stat-grid">
            <article class="card"><span class="stat">${displayedLifetimeViews.toLocaleString()}</span><p>Lifetime page views</p></article>
            <article class="card"><span class="stat">${Number(stats.analytics.totalPageViews || 0).toLocaleString()}</span><p>Backend stored page views</p></article>
            <article class="card"><span class="stat">${Number(stats.analytics.viewsToday || 0).toLocaleString()}</span><p>Page views today</p></article>
            <article class="card"><span class="stat">${Number(stats.userCount).toLocaleString()}</span><p>Created accounts</p></article>
            <article class="card"><span class="stat">${Number(stats.signupsToday || 0).toLocaleString()}</span><p>Signups today</p></article>
            <article class="card"><span class="stat">${Number(stats.signupConversionRate || 0)}%</span><p>Signup conversion today</p></article>
            <article class="card"><span class="stat">${Number(stats.newsletterSubscriberCount || 0).toLocaleString()}</span><p>Newsletter subscribers</p></article>
            <article class="card"><span class="stat">${Number(stats.newsletterToday || 0).toLocaleString()}</span><p>Newsletter signups today</p></article>
            <article class="card"><span class="stat">${Number(stats.activeSessionCount).toLocaleString()}</span><p>Active sessions</p></article>
            <article class="card"><span class="stat">${Number(stats.sharedBarcodeMappingCount || 0).toLocaleString()}</span><p>Shared barcode mappings</p></article>
          </section>
          <section class="card" style="margin-bottom: 18px">
            <h2>Tracking window</h2>
            <p>
              First tracked: <strong>${escapeHtml(stats.analytics.firstTrackedAt || 'Not tracked yet')}</strong><br />
              Last tracked: <strong>${escapeHtml(stats.analytics.lastTrackedAt || 'Not tracked yet')}</strong><br />
              Dashboard generated: <strong>${escapeHtml(stats.generatedAt || 'Unknown')}</strong>
            </p>
            <p>
              Lifetime page views use the highest count this browser has seen, so the admin dashboard does not appear
              to go backwards if the backend is waking up or being redeployed.
            </p>
          </section>
          <section class="grid">
            <article class="card">
              <h2>Top pages</h2>
              <table><tbody>${renderCounterRows(stats.analytics.topPages)}</tbody></table>
            </article>
            <article class="card">
              <h2>Traffic sources</h2>
              <table><tbody>${renderCounterRows(stats.analytics.topReferrers)}</tbody></table>
            </article>
            <article class="card">
              <h2>Device split</h2>
              <table><tbody>${renderCounterRows(stats.analytics.deviceTypes)}</tbody></table>
            </article>
            <article class="card">
              <h2>Daily views</h2>
              <table><tbody>${(stats.analytics.dailyViews || [])
                .map((item) => `<tr><td>${escapeHtml(item.date)}</td><td>${Number(item.views).toLocaleString()}</td></tr>`)
                .join('') || '<tr><td colspan="2">Nothing tracked yet.</td></tr>'}</tbody></table>
            </article>
          </section>
          <section class="card" style="margin-top: 18px">
            <h2>Newsletter subscribers</h2>
            <table>
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Source</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody>${renderSubscriberRows(stats.newsletterSubscribers)}</tbody>
            </table>
          </section>
          <section class="card" style="margin-top: 18px">
            <div class="card-heading-row">
              <div>
                <h2>Account email addresses</h2>
                <p>Emails from accounts created in Retro Vault Elite.</p>
              </div>
              <button class="small-button" type="button" data-action="copy-account-emails">Copy emails</button>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Name</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody>${renderAccountEmailRows(stats.users)}</tbody>
            </table>
          </section>
          <section class="card" style="margin-top: 18px">
            <h2>Accounts</h2>
            <table>
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Name</th>
                  <th>Created</th>
                  <th>Last synced</th>
                  <th>Owned</th>
                  <th>Wanted</th>
                  <th>Favorites</th>
                  <th>Currency</th>
                </tr>
              </thead>
              <tbody>${renderUserRows(stats.users)}</tbody>
            </table>
          </section>
          <section class="card" style="margin-top: 18px">
            <div class="card-heading-row">
              <div>
                <h2>Shared barcode index</h2>
                <p>Paste JSON mappings here to improve automatic barcode matches across devices.</p>
              </div>
              <div style="display:flex; gap:10px; flex-wrap:wrap">
                <button class="small-button" type="button" data-action="refresh-barcodes">Refresh barcode index</button>
                <button class="small-button" type="button" data-action="copy-barcodes">Copy barcode JSON</button>
              </div>
            </div>
            <label style="margin-bottom: 12px">
              Barcode import JSON
              <textarea id="barcode-import" rows="8" style="width:100%; border-radius:22px; border:1px solid var(--line); background:rgba(255,255,255,0.06); color:var(--text); padding:14px 16px; font:inherit; resize:vertical"></textarea>
            </label>
            <label style="display:flex; align-items:center; gap:10px; margin-bottom: 12px">
              <input id="barcode-replace" type="checkbox" style="min-height:auto; width:auto" />
              Replace existing shared barcode mappings
            </label>
            <button class="small-button" type="button" data-action="import-barcodes">Import barcode mappings</button>
            <table style="margin-top:18px">
              <thead>
                <tr>
                  <th>Barcode</th>
                  <th>Game ID</th>
                  <th>Source</th>
                  <th>Updated</th>
                </tr>
              </thead>
              <tbody>${renderBarcodeRows(latestBarcodeMappings)}</tbody>
            </table>
          </section>
        `
      }

      function normalizeImportedBarcodePayload(raw) {
        if (Array.isArray(raw)) {
          return raw
            .map((entry) => ({
              code: String(entry?.code || '').trim(),
              gameId: String(entry?.gameId || '').trim(),
              source: String(entry?.source || 'admin import').trim(),
            }))
            .filter((entry) => entry.code && entry.gameId)
        }

        if (raw && typeof raw === 'object') {
          return Object.entries(raw)
            .map(([code, value]) => ({
              code: String(code || '').trim(),
              gameId: String(value?.gameId || value || '').trim(),
              source: String(value?.source || 'admin import').trim(),
            }))
            .filter((entry) => entry.code && entry.gameId)
        }

        return []
      }

      async function loadBarcodes() {
        const key = keyInput.value.trim()

        if (!key) {
          return
        }

        const response = await fetch(`${API_BASE_URL}/admin/barcodes`, {
          headers: {
            'X-Admin-Key': key,
          },
        })
        const payload = await response.json()

        if (!response.ok) {
          throw new Error(payload.error || 'Could not load barcode mappings.')
        }

        latestBarcodeMappings = Array.isArray(payload.mappings) ? payload.mappings : []
        localStorage.setItem(cachedBarcodesKey, JSON.stringify(latestBarcodeMappings))
      }

      async function saveBarcodes() {
        const key = keyInput.value.trim()
        const textarea = document.querySelector('#barcode-import')
        const replaceCheckbox = document.querySelector('#barcode-replace')

        if (!key) {
          throw new Error('Paste your admin key first.')
        }

        const parsed = JSON.parse(textarea.value || '[]')
        const mappings = normalizeImportedBarcodePayload(parsed)

        if (!mappings.length) {
          throw new Error('Paste valid barcode JSON first.')
        }

        const response = await fetch(`${API_BASE_URL}/admin/barcodes`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Key': key,
          },
          body: JSON.stringify({
            replace: Boolean(replaceCheckbox?.checked),
            mappings,
          }),
        })
        const payload = await response.json()

        if (!response.ok) {
          throw new Error(payload.error || 'Could not save barcode mappings.')
        }

        textarea.value = ''
        if (replaceCheckbox) {
          replaceCheckbox.checked = false
        }
        await loadBarcodes()
        statusEl.className = 'ok'
        statusEl.textContent = `Imported ${Number(payload.importedCount || mappings.length).toLocaleString()} barcode mappings.`
        renderStats(JSON.parse(localStorage.getItem(cachedStatsKey) || 'null') || { analytics: {}, users: [] })
      }

      function renderCachedStats() {
        const cached = localStorage.getItem(cachedStatsKey)

        if (!cached) {
          return false
        }

        try {
          const stats = JSON.parse(cached)
          renderStats(stats)
          statusEl.className = 'ok'
          statusEl.textContent = `Showing last cached admin metrics from ${stats.generatedAt || 'an earlier visit'}. Refreshing...`
          return true
        } catch {
          localStorage.removeItem(cachedStatsKey)
          return false
        }
      }

      async function loadStats() {
        const key = keyInput.value.trim()

        if (!key) {
          statusEl.className = 'error'
          statusEl.textContent = 'Paste your admin key first.'
          return
        }

        statusEl.className = ''
        statusEl.textContent = 'Loading admin metrics...'

        try {
          const response = await fetch(`${API_BASE_URL}/admin/stats`, {
            headers: {
              'X-Admin-Key': key,
            },
          })
          const stats = await response.json()

          if (!response.ok) {
            throw new Error(stats.error || 'Could not load stats.')
          }

          sessionStorage.setItem('retro-vault-admin-key', key)
          localStorage.setItem(cachedStatsKey, JSON.stringify(stats))
          await loadBarcodes().catch(() => {})
          statusEl.className = 'ok'
          statusEl.textContent = `Loaded. Last updated ${stats.generatedAt}.`
          renderStats(stats)
        } catch (error) {
          statusEl.className = 'error'
          statusEl.textContent = error instanceof Error ? `${error.message} Showing cached stats if available.` : 'Could not load stats.'
          renderCachedStats()
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault()
        await loadStats()
      })

      resultsEl.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-action="copy-account-emails"]')
        const barcodeRefreshButton = event.target.closest('[data-action="refresh-barcodes"]')
        const barcodeCopyButton = event.target.closest('[data-action="copy-barcodes"]')
        const barcodeImportButton = event.target.closest('[data-action="import-barcodes"]')

        if (barcodeRefreshButton) {
          try {
            await loadBarcodes()
            renderStats(JSON.parse(localStorage.getItem(cachedStatsKey) || 'null') || { analytics: {}, users: [] })
            statusEl.className = 'ok'
            statusEl.textContent = `Loaded ${latestBarcodeMappings.length.toLocaleString()} shared barcode mappings.`
          } catch (error) {
            statusEl.className = 'error'
            statusEl.textContent = error instanceof Error ? error.message : 'Could not refresh barcode mappings.'
          }
          return
        }

        if (barcodeCopyButton) {
          const json = JSON.stringify(latestBarcodeMappings, null, 2)
          await navigator.clipboard.writeText(json)
          statusEl.className = 'ok'
          statusEl.textContent = `Copied ${latestBarcodeMappings.length.toLocaleString()} barcode mappings.`
          return
        }

        if (barcodeImportButton) {
          try {
            await saveBarcodes()
          } catch (error) {
            statusEl.className = 'error'
            statusEl.textContent = error instanceof Error ? error.message : 'Could not import barcode mappings.'
          }
          return
        }

        if (!button) {
          return
        }

        let users = []

        try {
          const cached = localStorage.getItem(cachedStatsKey)
          const stats = cached ? JSON.parse(cached) : null
          users = Array.isArray(stats?.users) ? stats.users : []
        } catch {
          users = []
        }

        const emailList = users.map((user) => user.email).filter(Boolean)
        const emails = emailList.join('\n')

        if (!emails) {
          statusEl.className = 'error'
          statusEl.textContent = 'No account emails to copy yet.'
          return
        }

        await navigator.clipboard.writeText(emails)
        statusEl.className = 'ok'
        statusEl.textContent = `Copied ${emailList.length} account email address${emailList.length === 1 ? '' : 'es'}.`
      })

      if (keyInput.value.trim()) {
        renderCachedStats()
        try {
          latestBarcodeMappings = JSON.parse(localStorage.getItem(cachedBarcodesKey) || '[]')
        } catch {
          latestBarcodeMappings = []
        }
        loadStats()
      }
    </script>
  </body>
</html>
