<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 48" width="268" height="48" role="img" aria-label="Retro Vault Elite">
  <title>Retro Vault Elite</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .ps2p { font-family: 'Press Start 2P', 'Courier New', Courier, monospace; }
    </style>
  </defs>

  <!-- Console icon — 44 × 40, centred vertically in 48 px -->
  <g transform="translate(0,4)">
    <!-- Body -->
    <rect x="3" y="9" width="38" height="27" rx="5" fill="#1e1630" stroke="#f1c95f" stroke-width="2"/>
    <!-- Screen -->
    <rect x="8" y="13" width="18" height="10" rx="2" fill="#080f1a"/>
    <!-- Screen glow line -->
    <line x1="9" y1="18" x2="25" y2="18" stroke="#5ac8fa" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
    <!-- D-pad horizontal -->
    <rect x="5" y="27" width="9" height="3.5" rx="1.5" fill="#fff1c4"/>
    <!-- D-pad vertical -->
    <rect x="8" y="24" width="3" height="9" rx="1.5" fill="#fff1c4"/>
    <!-- Action button orange -->
    <circle cx="31" cy="28" r="3.5" fill="#ff7a18"/>
    <!-- Action button gold -->
    <circle cx="39" cy="28" r="3.5" fill="#f1c95f"/>
    <!-- Select pill -->
    <rect x="19" y="32" width="4.5" height="2.5" rx="1.2" fill="#8890a8" opacity="0.75"/>
    <!-- Start pill -->
    <rect x="25.5" y="32" width="4.5" height="2.5" rx="1.2" fill="#8890a8" opacity="0.75"/>
    <!-- Top cartridge ridge -->
    <path d="M13 9 L17 4 L27 4 L31 9" fill="none" stroke="#f1c95f" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="54" y="23" class="ps2p" font-family="'Press Start 2P','Courier New',Courier,monospace" font-size="15" fill="#f1c95f">RETRO VAULT</text>
  <text x="56" y="41" class="ps2p" font-family="'Press Start 2P','Courier New',Courier,monospace" font-size="9" fill="#c9a8ff" letter-spacing="5">ELITE</text>
</svg>
