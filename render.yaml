services:
  - type: web
    name: retro-vault-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      - key: PORT
        value: 8787
      - key: DATA_DIR
        value: server/data
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: retro-vault-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
