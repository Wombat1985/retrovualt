services:
  - type: web
    name: retro-vault-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      - key: PORT
        value: 8787
      - key: DATA_DIR
        value: server/data
      - key: CORS_ORIGIN
        sync: false
      - key: SESSION_TTL_DAYS
        value: 30
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 30
      - key: RESEND_API_KEY
        sync: false
      - key: RESET_FROM_EMAIL
        sync: false
      - key: ADMIN_KEY
        sync: false

  - type: web
    name: retro-vault-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
